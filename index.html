<script>
    // ลงทะเบียน Service Worker เพื่อให้เว็บโหลดเร็ว
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js');
        });
    }

    // เปิดแสดงแบนเนอร์ทันทีเพื่อให้คนกดโหลดแอป
    const installBanner = document.getElementById('install-banner');
    const btnInstall = document.getElementById('btn-install');
    
    // แสดงแถบสีม่วงทันทีเมื่อเข้าเว็บ
    installBanner.style.display = 'flex';

    // เมื่อกดปุ่ม Install ให้ลิงก์ไปดาวน์โหลดไฟล์ APK จาก Google Drive โดยตรง
    btnInstall.addEventListener('click', () => {
        window.location.href = "https://drive.google.com/file/d/1y5gR6uavcFqMN46C2-TgEnsj37YmDFE_/view?usp=drivesdk";
    });
</script>
